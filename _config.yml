title: "Kyongmin Kwon | Quantum Optics & ML Research"
email: your-email@example.com # 실제 이메일 주소로 변경
description: "Exploring the frontiers of Quantum Optics, Quantum Information Processing, and Machine Learning."
baseurl: "" # GitHub Pages에 배포 시 /your-repo-name 으로 변경
url: "http://yourwebsite.com" # 실제 웹사이트 URL로 변경

# Header Settings
header_background: "#0a192f"

# Social Media
twitter_username: your_twitter_handle # 실제 Twitter/X 핸들로 변경
linkedin_username: your_linkedin_handle # 실제 LinkedIn 핸들로 변경
github_username: your_github_handle # 실제 GitHub 핸들로 변경

# Build settings
markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-sitemap

# Exclude from processing.
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/